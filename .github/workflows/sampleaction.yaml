name: Build and Deploy to Windows Server

on:
  push:
    branches:
      - main
  workflow_dispatch:   # allows manual run from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Run tests
      - name: Run tests
        run: npm test

      # 5. Build project
      - name: Build project
        run: npm run build

      # 6. Debug: list build files
      - name: List build files
        run: ls -R build

      # 7. Upload build artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: build/

  deploy:
    runs-on: windows-latest
    needs: build

    steps:
      # 1. Download artifact into a fixed folder
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: node-app   # 👈 ensures folder exists here

      # 2. Debug: list downloaded files
      - name: List downloaded files
        run: dir node-app

      # 3. Copy files to Windows Server (via PowerShell)
      - name: Copy files to Windows Server
        run: |
          $source = "$(Get-Location)\node-app"
          $target = "C:\inetpub\wwwroot\internal-app"
          Write-Host "Copying from $source to $target"
          Copy-Item -Path "$source\*" -Destination $target -Recurse -Force

      # 4. Restart IIS (or replace with your service)
      - name: Restart IIS
        run: iisreset /restart
