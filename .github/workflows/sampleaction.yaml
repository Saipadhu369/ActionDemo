name: Build and Deploy to Windows Server

on:
  push:
    branches:
      - main   # Trigger workflow on push to main branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Setup Node.js (example app)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Run tests
      - name: Run tests
        run: npm test

      # 5. Build project
      - name: Build project
        run: npm run build

      # 6. Upload build artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: node-app
          path: build/

  deploy:
    runs-on: windows-latest
    needs: build

    steps:
      # 1. Download build artifact
      - name: Download artifact
        uses: actions/download-artifact@v3
        with:
          name: node-app

      # 2. Copy files to Windows Server (via PowerShell)
      - name: Copy files to Windows Server
        run: |
          $target = "\\${{ secrets.WINDOWS_SERVER_HOST }}\c$\inetpub\wwwroot\internal-app"
          Copy-Item -Path build\* -Destination $target -Recurse -Force

      # 3. Restart IIS (or replace with your service)
      - name: Restart IIS
        run: iisreset /restart
