name: Build and Deploy Internally

on:
  push:
    branches:
      - main   # Trigger on push to main branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Setup Node.js (example app)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Run tests
      - name: Run tests
        run: npm test

      # 5. Build project
      - name: Build project
        run: npm run build

      # 6. Upload build artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: node-app
          path: build/

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      # 1. Download build artifact
      - name: Download artifact
        uses: actions/download-artifact@v3
        with:
          name: node-app

      # 2. Copy files to internal server via SSH
      - name: Deploy to internal server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.INTERNAL_SERVER_HOST }}
          username: ${{ secrets.INTERNAL_SERVER_USER }}
          key: ${{ secrets.INTERNAL_SERVER_SSH_KEY }}
          source: "./build/*"
          target: "/var/www/internal-app"

      # 3. Restart service on server
      - name: Restart service
        uses: appleboy/ssh-action@v0.1.7 
        with:
          host: ${{ secrets.INTERNAL_SERVER_HOST }}
          username: ${{ secrets.INTERNAL_SERVER_USER }}
          key: ${{ secrets.INTERNAL_SERVER_SSH_KEY }}
          script: |
            sudo systemctl restart internal-app.service
